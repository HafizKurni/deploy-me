services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    environment:
      TZ: Asia/Jakarta
      DISABLE_IPV6: "true"
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - pisazor

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - TZ=Asia/Jakarta
      - N8N_HOST=n8n.pisazor.com
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - N8N_LISTEN_ADDRESS=0.0.0.0
      - WEBHOOK_URL=https://n8n.pisazor.com/
      - N8N_EDITOR_BASE_URL=https://n8n.pisazor.com/
      - N8N_PROXY_HOPS=1
      - N8N_PUSH_BACKEND=websocket
      - N8N_SECURE_COOKIE=false
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_ENCRYPTION_KEY=571202c9273883fad9d6f88046a1fff38b307d65e4caaada2c05f33ed4c76aca
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - pisazor

volumes:
  n8n_data:

networks:
  pisazor:
    driver: bridge
